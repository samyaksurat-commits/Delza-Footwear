<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Surat Footwear</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { background: white; padding: 50px; width: 100%; max-width: 500px; border-radius: 4px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h2 { text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 30px; font-weight: 900; }
        
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        input, textarea, select { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 2px; outline: none; font-size: 1rem; }
        input:focus { border-color: #000; }
        
        .submit-btn { width: 100%; background: black; color: white; border: none; padding: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .submit-btn:hover { background: #FF3E3E; }
        
        .back-link { display: block; text-align: center; margin-top: 25px; color: #888; text-decoration: none; font-size: 0.8rem; }
        .back-link:hover { color: black; }
    </style>
</head>
<body>

<div class="container">
    <h2>Get In Touch</h2>
    <form>
        <div class="field">
            <label>Your Name</label>
            <input type="text" placeholder="John Doe" required>
        </div>
        <div class="field">
            <label>Email Address</label>
            <input type="email" placeholder="john@example.com" required>
        </div>
        <div class="field">
            <label>Subject</label>
            <select>
                <option>Store Partnership</option>
                <option>Bulk Orders</option>
                <option>Customer Support</option>
            </select>
        </div>
        <div class="field">
            <label>Message</label>
            <textarea rows="4" placeholder="How can we help you?"></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Message</button>
    </form>
    <a href="index.html" class="back-link">← Return to Home</a>
</div>

</body>
</html>
